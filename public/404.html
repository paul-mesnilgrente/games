<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Games</title>
    <!--
      GitHub Pages has no server-side routing, so a hard refresh on a deep
      link like /games/belote returns 404. This page (served for any unknown
      path) rewrites the URL into a query string and bounces to index.html,
      where the snippet in index.html turns it back into a real route.
      pathSegmentsToKeep = 1 keeps the "/games" base segment.
      See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
